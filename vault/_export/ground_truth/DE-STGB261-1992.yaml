escopo: This section of the German Penal Code defines the criminal offense of money
  laundering. It criminalizes concealing, transferring, or using assets derived from
  unlawful acts to obscure their illicit origin.
gap_ou_ambiguidade: The law's application to crypto-assets hinges on proving knowledge
  or negligent ignorance of illicit origins. This creates an opportunity for blockchain
  analysis and compliance tools to establish a standard of care for market participants.
