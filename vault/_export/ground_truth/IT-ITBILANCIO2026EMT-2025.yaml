escopo: This law establishes a preferential tax rate for MiCA-compliant E-Money Tokens
  denominated in euro. It is a tax provision, not a comprehensive operational or licensing
  framework.
gap_ou_ambiguidade: The norm does not specify the process or criteria for verifying
  that an E-Money Token is 'MiCA-compliant' and 'structured as a payment instrument'
  to qualify for the tax benefit.
