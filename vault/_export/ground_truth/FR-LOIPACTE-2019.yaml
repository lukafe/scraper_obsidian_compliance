escopo: This law created the French legal framework for Digital Asset Service Providers
  (PSAN). It defines digital assets and establishes a dual regime of mandatory registration
  and optional licensing for various crypto-asset services.
gap_ou_ambiguidade: The law requires licensed PSANs to have 'resilient and secure
  IT systems' but does not specify technical standards. This allows independent auditors
  to assess and attest to the robustness of cybersecurity controls for applicants.
