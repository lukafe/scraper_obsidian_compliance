escopo: This ordinance implements UN anti-terrorism measures and FATF recommendations.
  It prohibits financing terrorist acts, dealing with terrorist property, and requires
  disclosure of suspected terrorist property.
gap_ou_ambiguidade: The ordinance requires reporting of 'suspected' terrorist property
  without defining the technical threshold for suspicion. This creates an opportunity
  for certifiers or tool providers to offer solutions for risk assessment and transaction
  monitoring.
