escopo: This text describes the role of the KoFIU in administering South Korea's AML/CFT
  framework. This includes receiving Suspicious Transaction Reports (STRs), Customer
  Due Diligence (CDD), and managing the registration of Virtual Asset Service Providers
  (VASPs).
gap_ou_ambiguidade: The text is a high-level overview and does not specify the technical
  or security requirements for VASP registration. The criteria and standards for compliance
  are not detailed, leaving room for interpretation.
