escopo: This Act establishes a general requirement for any person or firm carrying
  on business in Singapore to register their business name. It is not specific to
  the crypto-asset industry.
gap_ou_ambiguidade: The Act provides a framework for business name registration but
  does not contain any specific provisions or technical requirements for crypto-asset
  businesses. Sector-specific obligations are not addressed.
