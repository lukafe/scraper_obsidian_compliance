escopo: This bill proposes a regulatory framework for digital assets, splitting jurisdiction
  between the CFTC for digital commodities and the SEC for investment-contract assets.
  It regulates exchanges, brokers, and dealers.
gap_ou_ambiguidade: The bill's distinction between CFTC and SEC jurisdiction hinges
  on whether a blockchain is 'mature' or has 'decentralized control'. These definitions
  create an opportunity for independent technical assessment.
