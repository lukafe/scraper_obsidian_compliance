escopo: This act establishes the legal basis for South Africa's exchange control system,
  which governs cross-border capital flows. The SARB administers the system by appointing
  Authorised Dealers to manage foreign exchange transactions.
gap_ou_ambiguidade: A High Court ruling suggested that crypto-assets fall outside
  the scope of these exchange control regulations. The regulator is appealing this
  and drafting new regulations, creating a significant but temporary regulatory gap.
