escopo: This regulation establishes a comprehensive framework for digital operational
  resilience in the EU financial sector. It sets harmonized rules for ICT risk management,
  incident reporting, resilience testing, and managing ICT third-party risk.
gap_ou_ambiguidade: The regulation relies heavily on future Regulatory Technical Standards
  (RTS) from the ESAs to specify key details, such as incident reporting thresholds
  and testing methodologies. This creates an opportunity for certifiers to help firms
  implement the high-level principles ahead of the final detailed rules.
