escopo: This ruling clarifies the US federal income tax treatment of cryptocurrency
  hard forks and airdrops. It establishes that receiving new cryptocurrency from an
  airdrop constitutes ordinary income at the time the taxpayer gains dominion and
  control over the asset.
gap_ou_ambiguidade: The ruling hinges on when a taxpayer gains 'dominion and control'
  over airdropped assets, which can be technically ambiguous. A certifier could provide
  attestations on the specific date and time a user technically gained the ability
  to transfer or sell assets on a given platform.
