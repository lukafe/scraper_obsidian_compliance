escopo: This decree designates the Central Bank of Brazil (BCB) as the regulator responsible
  for authorizing and supervising virtual asset service providers, implementing Law
  14,478/2022.
gap_ou_ambiguidade: The decree is a high-level delegation of power and does not specify
  the detailed technical or operational requirements for licensing. These standards
  are left for the Central Bank to define in future regulations.
