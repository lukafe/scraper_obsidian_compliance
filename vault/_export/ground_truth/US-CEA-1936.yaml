escopo: The Act gives the CFTC jurisdiction over commodity derivatives, such as futures
  and swaps. It also provides anti-fraud and anti-manipulation authority over the
  spot markets for commodities, including certain crypto-assets.
gap_ou_ambiguidade: The CEA does not provide the CFTC with direct regulatory authority
  over spot commodity markets, including crypto spot exchanges. This creates a gap,
  as there is no comprehensive federal market structure or registration regime for
  these platforms.
