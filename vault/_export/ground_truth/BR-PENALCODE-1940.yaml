escopo: This norm amends the Brazilian Penal Code to criminalize fraud committed through
  the use of virtual assets, securities, or financial assets. It establishes a penalty
  of 4 to 8 years of imprisonment plus a fine.
gap_ou_ambiguidade: The law defines a criminal offense but does not establish preventive
  compliance requirements for businesses. This creates an opportunity for certifiers
  to attest to anti-fraud controls, helping companies mitigate legal and operational
  risks.
