escopo: This norm details the requirements for a mandatory technical certification
  by an independent firm. This certification is a prerequisite for entities seeking
  to provide crypto-asset intermediation and custody services in Brazil.
gap_ou_ambiguidade: The regulation requires certification by an 'independent qualified
  company' but does not specify the required credentials or standards for the certifier.
  This creates an opportunity for firms to establish best practices and define what
  constitutes a qualified technical certification.
