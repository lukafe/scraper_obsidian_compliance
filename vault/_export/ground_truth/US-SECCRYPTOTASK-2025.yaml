escopo: This guidance establishes a task force to provide clarity on applying federal
  securities laws to crypto assets. It aims to recommend policies, draw clear regulatory
  lines, and create paths to registration.
gap_ou_ambiguidade: The task force's entire purpose is to address the ambiguity of
  how securities laws apply to crypto. The key gap is the lack of clear criteria to
  distinguish securities from non-securities.
