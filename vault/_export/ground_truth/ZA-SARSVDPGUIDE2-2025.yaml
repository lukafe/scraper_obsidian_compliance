escopo: This guide outlines South Africa's permanent Voluntary Disclosure Programme
  (VDP), allowing taxpayers to regularize tax defaults. The program is a general tax
  administration tool and is not specific to crypto-assets.
gap_ou_ambiguidade: The text does not address crypto-assets, creating a gap regarding
  how to value assets or classify defaults for disclosure purposes. This suggests
  an opportunity for specialized tax advisory services.
