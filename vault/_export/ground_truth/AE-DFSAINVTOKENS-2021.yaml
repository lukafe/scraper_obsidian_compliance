escopo: The framework regulates Investment Tokens, defined as Security Tokens or Derivative
  Tokens on DLT. It applies to firms marketing, issuing, trading, or holding these
  tokens in or from the DIFC.
gap_ou_ambiguidade: The framework explicitly excludes exchange tokens (cryptocurrencies),
  utility tokens, and stablecoins, which are subject to future consultation. The announcement
  lacks specific technical requirements for licensed firms.
