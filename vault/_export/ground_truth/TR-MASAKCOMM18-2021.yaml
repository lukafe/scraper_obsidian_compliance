escopo: This guidance designates Crypto Asset Service Providers (CASPs) as obligated
  parties under Turkey's AML/CFT framework. It requires them to implement customer
  identification, transaction monitoring, and Travel Rule compliance.
gap_ou_ambiguidade: The guidance mentions 'technological risks' but does not specify
  technical standards for IT security or custody. This leaves a gap that could be
  filled by independent audits against industry best practices.
