escopo: This act classifies dealers in virtual currency as Money Services Businesses
  (MSBs). It requires them to register with FINTRAC and comply with federal AML/CFT
  obligations, including KYC and transaction reporting.
gap_ou_ambiguidade: The act mandates a risk-based AML/CFT program but does not prescribe
  specific technical standards for transaction monitoring systems or blockchain analytics
  tools. This leaves room for interpretation on what constitutes an effective and
  compliant system.
