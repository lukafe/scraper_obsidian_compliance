escopo: This regulation prohibits the direct or indirect use of crypto-assets for
  payments in Turkey. It also forbids payment and electronic money institutions from
  processing fund transfers to or from crypto-asset platforms.
gap_ou_ambiguidade: The regulation's definition of a crypto-asset is broad, which
  could create ambiguity for new digital assets. It bans the use of payment rails
  for crypto but does not regulate crypto service providers themselves.
