escopo: This Act establishes the legal framework for a corporate structure known as
  a Variable Capital Company (VCC), intended for use by collective investment schemes.
gap_ou_ambiguidade: The Act defines a 'custodian' for the safekeeping of assets but
  does not specify any technical or security standards for this function. This is
  a gap for VCCs holding digital assets, where standards for secure custody could
  be certified.
