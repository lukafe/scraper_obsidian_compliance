escopo: This act provides the legal authority for the Canadian government to impose
  economic sanctions on foreign jurisdictions, persons, and entities. It enables regulations
  to restrict or prohibit trade, financial transactions, and other economic activities.
gap_ou_ambiguidade: The act is a general framework and does not explicitly mention
  crypto-assets. Its application to decentralized finance (DeFi) or non-custodial
  wallets is not specified, creating potential compliance ambiguity.
