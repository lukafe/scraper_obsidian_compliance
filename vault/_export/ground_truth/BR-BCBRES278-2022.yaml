escopo: This regulation establishes the reporting requirements for foreign capital
  inflows into Brazil, specifically for external credit and foreign direct investment.
  An amendment brings operations involving virtual assets under this same reporting
  framework, effective May 2026.
gap_ou_ambiguidade: The rule requires reporting the fiat currency value of virtual
  asset operations but does not specify the valuation methodology. This creates an
  opportunity for independent certifiers to provide standardized and auditable valuation
  services.
