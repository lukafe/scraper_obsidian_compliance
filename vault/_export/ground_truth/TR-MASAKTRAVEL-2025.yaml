escopo: This guidance clarifies AML/CFT obligations for Crypto Asset Service Providers
  (CASPs). It covers customer identification, enhanced due diligence, and Travel Rule
  implementation.
gap_ou_ambiguidade: The guidance mentions 'measures to be taken against technological
  risks' but does not specify technical standards. This creates an opportunity for
  independent certification of risk management frameworks.
