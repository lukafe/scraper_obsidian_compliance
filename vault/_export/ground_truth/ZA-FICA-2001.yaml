escopo: This law designates Crypto Asset Service Providers (CASPs) as 'accountable
  institutions' under its AML/CFT framework. It imposes duties including customer
  due diligence (CDD/KYC), transaction monitoring, and reporting to the Financial
  Intelligence Centre (FIC).
gap_ou_ambiguidade: The Act imposes general AML/CFT duties but does not specify technical
  standards for crypto transaction monitoring. This creates an opportunity for certifiers
  to establish best practices for blockchain analytics and risk scoring.
