escopo: This guidance clarifies that while no specific ICO regulation exists, existing
  financial market laws may apply. The applicability of AML, banking, securities,
  or collective investment scheme rules is assessed case-by-case.
gap_ou_ambiguidade: The guidance creates ambiguity by applying a case-by-case analysis
  without defining clear criteria for token classification. This leaves issuers uncertain
  as to which specific financial regulations apply to their offering.
