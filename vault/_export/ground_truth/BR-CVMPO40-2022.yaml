escopo: This guidance consolidates the CVM's position on when crypto-assets are considered
  securities. It applies a functional, substance-over-form test to make this determination.
gap_ou_ambiguidade: The application of a principles-based functional test creates
  legal uncertainty for specific crypto-assets. This creates a need for independent
  expert analysis to assess if a token qualifies as a security.
