escopo: The regulation requires a license for virtual currency business activities
  involving New York or its residents. This includes transmitting, custodying, buying,
  selling, exchanging, or issuing virtual currency.
gap_ou_ambiguidade: The framework allows licensees to self-certify new coin listings
  based on a DFS-approved policy. This creates an opportunity for third parties to
  assist in developing compliant policies and conducting coin risk assessments.
