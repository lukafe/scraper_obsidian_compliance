escopo: This resolution establishes a mandatory cybersecurity policy for payment institutions
  and other regulated entities, including virtual asset service providers from 2026.
  It details requirements for risk management, incident response, and contracting
  cloud services.
gap_ou_ambiguidade: The rule requires institutions to review audit reports from their
  cloud/data service providers (Art. 12.II.e) but does not specify the required audit
  standards. This creates an opportunity for certifiers to establish a market-accepted
  standard.
