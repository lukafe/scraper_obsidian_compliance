escopo: This regulation establishes an authorization and prudential supervision regime
  for electronic money issuers. It applies to fiat-referenced crypto-tokens if they
  meet the legal definition of e-money.
gap_ou_ambiguidade: The key ambiguity is determining when a specific fiat-referenced
  stablecoin legally qualifies as 'e-money'. This classification dictates whether
  this comprehensive licensing regime applies, creating an opportunity for legal and
  technical assessment services.
