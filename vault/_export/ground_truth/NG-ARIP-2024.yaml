escopo: This program provides a provisional licensing pathway for crypto firms to
  operate in a supervised sandbox. It acts as a transitional gateway to the market
  while final digital asset rules are developed.
gap_ou_ambiguidade: The text lacks any specific technical, security, or compliance
  requirements for firms seeking a provisional license under the ARIP. This creates
  an opportunity for certifiers to propose standards for entry.
