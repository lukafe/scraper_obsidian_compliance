escopo: This consultation paper proposes a regulatory regime for sterling-denominated
  systemic stablecoins in the UK. It focuses on prudential requirements like backing
  assets, capital, and redemption rights to ensure financial stability.
gap_ou_ambiguidade: The paper requires wind-down plans to be validated by external
  auditors but does not specify the standards for this validation. Technical security
  and operational resilience requirements are also mentioned but not detailed, leaving
  a gap for independent assessment.
