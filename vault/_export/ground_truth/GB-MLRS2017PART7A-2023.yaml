escopo: This regulation implements the FATF Travel Rule for UK cryptoasset businesses.
  It mandates the collection, verification, and transmission of originator and beneficiary
  information with cryptoasset transfers.
gap_ou_ambiguidade: The regulation does not prescribe a specific technical standard
  or protocol for transmitting Travel Rule data. This creates an opportunity for certifiers
  to validate the effectiveness and compliance of a firm's chosen solution.
