escopo: This act governs the requirement to prepare, have approved by the regulator,
  and publish a prospectus for public offerings of securities, including security
  tokens.
gap_ou_ambiguidade: The law requires full disclosure in the prospectus but does not
  specify technical standards for security tokens. This creates a gap regarding the
  expected level of technical due diligence and disclosure for smart contracts and
  underlying protocols.
