escopo: This rule implements the FATF Travel Rule for crypto-asset transfers. It requires
  financial intermediaries to transmit originator and beneficiary information.
gap_ou_ambiguidade: The strict requirement to verify information for transfers involving
  self-hosted wallets presents a significant technical and operational challenge.
  Certifiers could audit the specific procedures and tools used for this verification.
