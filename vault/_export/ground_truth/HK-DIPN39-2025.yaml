escopo: This guidance clarifies the application of Hong Kong's profits tax to digital
  assets. It explains how to determine if profits from activities like trading, mining,
  or ICOs are taxable business income or non-taxable capital gains.
gap_ou_ambiguidade: The guidance relies on the subjective 'badges of trade' test to
  distinguish between taxable trading and non-taxable investment. This creates ambiguity
  in classifying digital asset profits, opening opportunities for advisory services
  to help firms structure and document their activities.
