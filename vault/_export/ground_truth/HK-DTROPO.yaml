escopo: This ordinance provides for the tracing, confiscation, and recovery of proceeds
  from drug trafficking. It creates offenses for dealing with property derived from
  such activities.
gap_ou_ambiguidade: This is a general criminal law and does not specifically address
  crypto-assets. The application of terms like 'property' and 'dealing' to crypto-assets
  is not explicitly defined, creating potential ambiguity in enforcement.
