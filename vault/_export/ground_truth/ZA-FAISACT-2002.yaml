escopo: This is the foundational statute for licensing and regulating financial advisory
  and intermediary services (FSPs) in South Africa. It was amended in 2022 to bring
  crypto-asset service providers under its scope.
gap_ou_ambiguidade: The Act is a general financial services framework from 2002, not
  a purpose-built crypto regulation. This creates potential gaps where specific technical
  standards for crypto custody, security, and operations are not defined.
