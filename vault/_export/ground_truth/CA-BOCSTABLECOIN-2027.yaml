escopo: This proposed guidance outlines prudential supervision standards for issuers
  of fiat-backed stablecoins, treating them as payment instruments.
gap_ou_ambiguidade: The guidance aims to converge with MiCA/EPI models, but the specific
  technical standards for this alignment are not yet defined. This creates an opportunity
  for certifiers to establish best practices.
