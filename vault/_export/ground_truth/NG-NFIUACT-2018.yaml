escopo: This act establishes the Nigerian Financial Intelligence Unit (NFIU) as the
  central AML/CFT agency. It requires reporting entities, including VASPs, to report
  suspicious and threshold-based transactions to the NFIU.
gap_ou_ambiguidade: The act establishes a general reporting duty but does not specify
  the technical standards, formats, or specific thresholds for VASP transaction reporting.
  This creates a gap that could be filled by independent certification of compliant
  monitoring and reporting frameworks.
