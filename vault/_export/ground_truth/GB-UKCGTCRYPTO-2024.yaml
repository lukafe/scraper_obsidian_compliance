escopo: This guidance provides a general overview of the UK's Capital Gains Tax (CGT).
  It defines CGT as a tax on the profit from disposing of an asset, including by selling,
  gifting, or swapping it.
gap_ou_ambiguidade: The provided text is a high-level overview and does not mention
