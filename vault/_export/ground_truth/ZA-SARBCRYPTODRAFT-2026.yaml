escopo: This proposes amendments to include crypto-assets in the capital flow management
  regime under the Currency and Exchanges Act. It also signals a move to criminalize
  undeclared crypto at borders.
gap_ou_ambiguidade: The text is a high-level proposal, so the specific technical and
  reporting requirements for crypto transactions under the capital flow regime are
  not yet defined.
