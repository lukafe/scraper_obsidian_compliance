escopo: This 2011 policy document proposes a 'twin-peaks' model for financial regulation
  in South Africa. It focuses on financial stability, consumer protection, and inclusion
  in traditional finance.
gap_ou_ambiguidade: As a high-level 2011 framework, the document does not address
  crypto-assets or related technologies. The entire regulatory approach for this asset
  class is therefore unaddressed.
