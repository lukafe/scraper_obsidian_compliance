escopo: The regulation establishes a registration system for Electronic Payment Service
  Providers, which offer payment initiation and account information aggregation services.
  It mandates contracts with banks and measures for user data security.
gap_ou_ambiguidade: The law requires security management of user information in contracts
  between providers and banks, but does not specify technical standards. This creates
  an opportunity for independent certifiers to assess security controls and API implementations
  against best practices.
