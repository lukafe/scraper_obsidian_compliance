escopo: This law establishes a general corporate tax regime in the UAE, treating crypto
  companies like any other business. It applies a 9% tax on taxable profits exceeding
  AED 375,000.
gap_ou_ambiguidade: The definition of 'qualifying income' for crypto-asset businesses
  in free zones is a key ambiguity. This creates an opportunity for advisory services
  to help firms meet the conditions for a 0% tax rate.
