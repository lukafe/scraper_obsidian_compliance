escopo: This act establishes the legal framework for the Norinchukin Bank, a cooperative
  financial institution for Japan's agriculture, forestry, and fisheries sectors.
  The text does not regulate crypto-assets.
gap_ou_ambiguidade: This law is entirely silent on crypto-assets. Any potential crypto-related
  activities by the bank would likely be governed by other specific Japanese financial
  laws, such as the Payment Services Act or the Financial Instruments and Exchange
  Act.
