escopo: This Act is Singapore's foundational anti-money laundering (AML) law. It criminalizes
  money laundering from serious crimes and establishes the Suspicious Transaction
  Reporting Office (STRO).
gap_ou_ambiguidade: As a foundational penal law, the Act does not specify technical
  AML/CFT standards for specific sectors like crypto-assets. Detailed requirements
  for transaction monitoring or blockchain analytics are left to sector-specific regulations.
