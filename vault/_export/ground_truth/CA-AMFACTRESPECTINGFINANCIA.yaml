escopo: This statute regulates the constitution, governance, and general financial
  activities of financial services cooperatives, such as credit unions, in Quebec.
  It does not address crypto-assets.
gap_ou_ambiguidade: The Act is entirely silent on crypto-assets, virtual currencies,
  or related activities. It is unclear whether financial services cooperatives are
  permitted to offer services involving these assets under this framework.
