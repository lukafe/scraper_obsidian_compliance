escopo: This resolution amends Brazil's foreign exchange (FX) market regulations.
  It updates the classification codes for reporting FX operations, including adding
  a specific code for 'Virtual assets'.
gap_ou_ambiguidade: The rule adds a reporting code for 'Virtual assets' under 'Trade
  in goods' but fails to define the term. This creates ambiguity for FX operators
  on what qualifies and how to value such transactions.
