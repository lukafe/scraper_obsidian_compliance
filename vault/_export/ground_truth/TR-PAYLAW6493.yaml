escopo: This law establishes a licensing framework for payment institutions and electronic
  money institutions in Turkey. It regulates payment services, systems, and the issuance
  of electronic money.
gap_ou_ambiguidade: The law delegates the definition of specific technical standards
  for information systems management and internal controls to secondary regulations.
  This creates an opportunity for certifiers to assess compliance against these future
  standards.
