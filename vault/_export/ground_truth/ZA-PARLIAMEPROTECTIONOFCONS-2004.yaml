escopo: This act concerns the protection of constitutional democracy against terrorist
  and related activities. It is a general anti-terrorism law, not a specific regulation
  for crypto-assets.
gap_ou_ambiguidade: The act was created in 2004, before the existence of modern crypto-assets.
  The text does not specify how its provisions apply to virtual assets or their service
  providers.
