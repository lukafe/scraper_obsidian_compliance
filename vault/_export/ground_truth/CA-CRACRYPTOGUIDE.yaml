escopo: This guidance clarifies the Canadian tax treatment of crypto-assets, defining
  them as commodities for tax purposes. It outlines how to report gains as either
  business income or capital gains and specifies record-keeping requirements.
gap_ou_ambiguidade: The distinction between business income (100% taxable) and capital
  gains (50% taxable) is determined case-by-case based on subjective factors. This
  creates ambiguity for taxpayers in classifying their transaction profits.
