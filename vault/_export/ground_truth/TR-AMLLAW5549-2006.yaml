escopo: This law establishes the principles and procedures for preventing the laundering
  of proceeds of crime in Türkiye. It defines obligated parties and imposes duties
  such as customer identification, suspicious transaction reporting, and record-keeping.
gap_ou_ambiguidade: The definition of 'Obligated Party' is broad and can be extended
  by the President, creating a need for emerging sectors to monitor their status.
  The law mandates risk-based controls (Art. 5) but does not specify technical standards,
  creating a gap for independent certifiers to help firms establish compliant systems.
