escopo: This law establishes the foundational AML/CFT framework in Argentina. It created
  the Financial Information Unit (UIF) and defined the duty to report for obligated
  parties.
gap_ou_ambiguidade: This original 2000 law does not contemplate virtual assets or
  provide specific technical compliance standards for the sector. The inclusion of
  VASPs as obligated subjects occurred via a 2024 reform, leaving this base text without
  specific rules for them.
