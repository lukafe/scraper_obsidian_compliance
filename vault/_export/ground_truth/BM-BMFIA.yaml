escopo: This text establishes Bermuda's Financial Intelligence Agency (FIA) as the
  central authority for receiving and analyzing Suspicious Activity Reports (SARs).
  It outlines the FIA's role in combating money laundering and terrorist financing.
gap_ou_ambiguidade: The text does not specify the technical standards or specific
  triggers for filing SARs related to crypto-asset transactions, creating a potential
  role for independent validation of monitoring systems.
