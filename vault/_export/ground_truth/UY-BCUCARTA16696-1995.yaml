escopo: This law is the Organic Charter of the Central Bank of Uruguay. It was amended
  to bring Virtual Asset Service Providers (VASPs) under its regulatory scope, requiring
  them to obtain authorization to operate.
gap_ou_ambiguidade: The law establishes a licensing framework for VASPs but lacks
  specific technical, security, or operational requirements. These details must be
  defined in future Central Bank regulations, creating an opportunity for certifiers
  to audit against forthcoming standards.
