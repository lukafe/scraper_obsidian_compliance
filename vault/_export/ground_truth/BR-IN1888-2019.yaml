escopo: This rule mandates the reporting of crypto-asset transactions to Brazil's
  federal tax authority (RFB). It applies to Brazilian exchanges and to individuals/entities
  transacting above a certain threshold on foreign exchanges or P2P.
gap_ou_ambiguidade: The norm requires reporting the value of operations in BRL but
  does not specify a valuation methodology for non-fiat transactions like crypto-to-crypto
  swaps or donations. This creates a gap for standardized valuation practices.
