escopo: This is the general Turkish Criminal Code. It establishes the fundamental
  principles of criminal liability, defines crimes, and sets out penalties, but does
  not specifically address crypto-assets.
gap_ou_ambiguidade: The law does not mention crypto-assets. A key ambiguity is how
  general criminal provisions, such as those for fraud or theft, apply to illicit
  activities involving digital assets.
