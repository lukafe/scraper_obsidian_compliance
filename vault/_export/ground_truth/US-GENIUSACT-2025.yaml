escopo: This law establishes a federal licensing framework for payment stablecoin
  issuers, known as Permitted Payment Stablecoin Issuers (PPSIs). It mandates 1:1
  reserves, monthly public reserve reporting, and par value redemption.
gap_ou_ambiguidade: The law grants supervisory and examination authority but does
  not specify the technical standards for reserve management or custody safekeeping.
  This creates an opportunity for independent certifiers to establish and audit against
  best-practice standards.
