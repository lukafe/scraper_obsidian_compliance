escopo: This regulation establishes a mandatory registration regime for Virtual Asset
  Service Providers (VASPs) in Argentina. It imposes comprehensive duties including
  AML, cybersecurity, asset segregation, and public proof-of-reserves.
gap_ou_ambiguidade: The rule requires a 'report from an IT expert' for registration
  and periodic audits but does not specify technical standards or qualifications for
  the expert. This creates an opportunity for certifiers to establish a de facto standard
  for VASP system audits.
