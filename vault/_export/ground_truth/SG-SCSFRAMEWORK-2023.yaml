escopo: This framework applies to single-currency stablecoins (SCS) issued in Singapore
  and pegged to the Singapore Dollar or any G10 currency. It establishes requirements
  for reserve assets, capital, redemption, and disclosure.
gap_ou_ambiguidade: The framework requires an audit of reserve assets but does not
  specify the standards for this audit or the qualifications for the independent auditor.
  This creates an opportunity for certifiers to establish and provide compliant attestation
  services.
