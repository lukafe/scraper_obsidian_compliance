escopo: This act establishes the legal framework for prohibiting the financing of
  terrorism in Singapore. Its broad definition of 'property' includes digital and
  electronic assets, making it applicable to crypto-assets.
gap_ou_ambiguidade: The act provides a broad, technology-neutral definition of 'property'
  but lacks specific technical standards for crypto-assets. This creates an opportunity
  for certifiers to validate the effectiveness of a VASP's on-chain monitoring tools
  against terrorism financing typologies.
