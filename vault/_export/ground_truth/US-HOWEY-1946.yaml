escopo: This case law establishes the 'Howey Test,' a legal test to determine if a
  transaction qualifies as an 'investment contract' and is therefore considered a
  security subject to registration requirements.
gap_ou_ambiguidade: The primary ambiguity is applying this 1946 test, designed for
  tangible assets, to novel crypto-assets. Determining whether returns depend on the
  'efforts of others' is particularly contentious for decentralized protocols, creating
  a need for expert analysis.
