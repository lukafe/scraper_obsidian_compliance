escopo: This decree is Italy's primary anti-money laundering (AML) law, establishing
  obligations for customer due diligence, record-keeping, and suspicious activity
  reporting. It explicitly includes crypto-asset service providers as obligated entities.
gap_ou_ambiguidade: The decree focuses on AML/CFT obligations and does not specify
  technical security standards for the custody of crypto-assets or the underlying
  IT infrastructure. This leaves a gap that could be addressed by independent certifications.
