escopo: This is an umbrella law implementing the EU's MiCA, TFR, and DORA regulations
  in Germany. It creates the KMAG (Crypto Markets Supervision Act) and amends various
  existing financial laws.
gap_ou_ambiguidade: As an implementation of broad EU regulations, specific technical
  standards and supervisory expectations from the German regulator (BaFin) are not
  yet fully detailed. This creates an opportunity for certifiers to help establish
  best practices for compliance.
