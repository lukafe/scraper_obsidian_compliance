escopo: This initiative is a 12-month effort to develop regulatory adaptations for
  spot crypto trading and the use of tokenized collateral in derivatives.
gap_ou_ambiguidade: The withdrawal of Staff Advisory 20-34 creates a regulatory vacuum
  on how Futures Commission Merchants (FCMs) can accept crypto as collateral. This
  initiative aims to define these rules, creating an opportunity for new standards.
