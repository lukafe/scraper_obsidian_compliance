escopo: This act provides the general federal income tax framework for Canada. It
  is the basis for the tax treatment of crypto-assets, which are typically handled
  as commodities for capital gains or business income purposes.
gap_ou_ambiguidade: The act does not provide specific rules for crypto-assets. The
  application of general tax principles to complex crypto activities like staking,
  DeFi, or airdrops remains subject to interpretation by tax authorities.
