escopo: This law establishes the Virtual Assets Regulatory Authority (VARA) and a
  mandatory licensing regime for Virtual Asset Service Providers (VASPs) in Dubai,
  excluding the DIFC.
gap_ou_ambiguidade: The law delegates specific technical requirements to various Rulebooks
  (e.g., Technology and Information, Custody Services). The detailed standards for
  IT security, audits, and custody are not in this text, creating an opportunity for
  certifiers to address the specific controls mandated in those documents.
