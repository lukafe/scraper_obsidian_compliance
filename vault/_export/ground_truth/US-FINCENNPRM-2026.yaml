escopo: This proposed rule would classify PPSIs as financial institutions under the
  Bank Secrecy Act. It would require them to implement AML/CFT and sanctions compliance
  programs.
gap_ou_ambiguidade: The rule's scope depends on the specific definition of 'PPSIs',
  which is not provided in the summary. The technical standards for implementing the
  required AML/CFT programs are also unspecified.
