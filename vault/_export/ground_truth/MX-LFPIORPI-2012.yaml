escopo: This law classifies the habitual or professional exchange of virtual assets
  as a 'vulnerable activity'. It imposes AML/CFT obligations, including registration,
  customer identification (KYC), and reporting to tax authorities.
gap_ou_ambiguidade: The law applies a general AML framework to crypto but lacks specific
  technical standards for virtual asset transaction monitoring (KYT). This creates
  an opportunity for independent validation of AML/CFT control effectiveness for crypto
  operations.
