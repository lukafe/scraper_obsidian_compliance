  NG:
    # ==================================================================
    # Aligned with the user's Nigeria Crypto Regulatory Matrix.
    # Nigeria is the largest African crypto market. ISA 2025 (Section
    # 357) made digital assets = securities by statute, putting SEC as
    # the apex regulator.
    # URL strategy: sec.gov.ng + cbn.gov.ng homes work; specific PDFs
    # blocked by Cloudflare. PLAC (placng.org) is the canonical Nigerian
    # law mirror. Many norms left for semantic resolver to find.
    # ==================================================================

    # ---------- Layer 1: Market regulation (SEC) ----------
    - title_hint: "Nigerian Investments and Securities Act (ISA) 2025 — landmark 226-page statute (March 2025) that rewrites securities law and in Section 357 classifies virtual/digital assets as securities; reaffirms SEC as apex regulator; VASPs, Digital Asset Operators (DAOPs) and Digital Asset Exchanges (DAEs) must register and be authorized by the SEC; criminalizes Ponzi and digital-asset fraud; repeals ISA 2007"
      title_original: "Investments and Securities Act, 2025"
      type: statute
      regulator: "National Assembly of Nigeria"
      date: "2025-03-01"
      short_label: "ISA2025"

    - title_hint: "Nigerian SEC Rules on Issuance, Offering Platforms and Custody of Digital Assets (2022) — first sectoral rules: registration of issuers, offering platforms, exchanges (DAX) and custodians of digital assets; capital, disclosure and conduct requirements; operational basis prior to ISA 2025"
      url_hint: "https://sec.gov.ng/"
      type: regulation
      regulator: "SEC Nigeria"
      date: "2022-05-13"
      short_label: "SECRULES2022"

    - title_hint: "Nigerian SEC New Digital Asset Rules / Rules on VASPs (2025) — post-ISA 2025 update: registration requirements, capital, AML/CFT, marketing restrictions and supervision of VASPs; NGN 30 million registration fee; foreign VASPs targeting Nigerian investors must meet conditions (home-country authorization + regulatory arrangement)"
      url_hint: "https://sec.gov.ng/"
      type: regulation
      regulator: "SEC Nigeria"
      date: "2025-06-30"
      short_label: "SECVASPRULES2025"

    - title_hint: "Nigerian Accelerated Regulatory Incubation Programme (ARIP) (2024) — sandbox-style accelerated onboarding; grants provisional licenses to crypto firms to operate under SEC supervision while the digital-asset rules are finalized; transitional gateway to market entry"
      url_hint: "https://sec.gov.ng/"
