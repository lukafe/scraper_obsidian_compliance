vault_path: ./vault
cache_path: ./cache

# Phased rollout: uncomment one country at a time, validate, move on.
# Override via CLI: `python -m src.orchestrator --countries BR,TR`
countries:
  - BR    # Phase 1 — Brazil (validation baseline) ✓
  - TR    # Phase 2 — Türkiye
  # - DE    # Phase 3 — Germany
  # - FR    # Phase 4 — France
  # --- not yet active ---
  # - US    # United States
  # - SG    # Singapore
  # - AE    # United Arab Emirates
  # - GB    # United Kingdom
  # - JP    # Japan
  # - CH    # Switzerland
  # - HK    # Hong Kong
  # - KR    # South Korea

# Supranational bodies are always seeded (FATF, BIS, FSB, IOSCO, etc.)
seed_supranational: true

node_types: [statute, regulation, guidance, case_law]

# Confidence + convergence
confidence_threshold: 0.70          # below -> quarantine
convergence_threshold: 0.85         # fraction of already-known refs to halt a country

# Budget caps — quality mode (token cost not a concern).
max_cycles_per_country: 4
max_new_nodes_per_cycle: 60
max_depth: 4                        # graph distance from any seed node
max_seed_per_country: 25            # how many seed normas to ask for in the first pass
max_tokens_per_country_per_cycle: 1500000

# Normalization
translate: true
target_language: en                 # only when translate=true; original is always preserved

# HTTP scraping
user_agent: "crypto-lawmap/0.1 (+research; contact: lucasfeka@gmail.com)"
http_timeout_seconds: 30
rate_limit_per_host_seconds: 1.5
respect_robots_txt: true
playwright_fallback: true

# LLM provider: "anthropic" or "gemini"
provider: gemini

# Per-provider model names. The active block is whichever matches `provider`.
models_anthropic:
  discovery: claude-sonnet-4-6
  analysis: claude-sonnet-4-6
  extraction: claude-haiku-4-5-20251001

# Quality mode: use Pro for analysis (deeper citation extraction);
# Flash is enough for breadth discovery and translation.
models_gemini:
  discovery: gemini-2.5-flash
  analysis: gemini-2.5-pro
  extraction: gemini-2.5-flash

# Legacy fallback (used if no per-provider block matches `provider`).
models:
  discovery: gemini-2.5-flash
  analysis: gemini-2.5-pro
  extraction: gemini-2.5-flash

# Per-prompt thinking budgets (Gemini 2.5 only).
# 0 disables. Higher = deeper reasoning, slower & more expensive.
thinking_budgets:
  discovery: 0        # enumeration; thinking would just blow the budget
  analysis: 8000      # legal-citation extraction benefits from reasoning
  extraction: 0       # translation is mechanical

# Per-prompt max output tokens.
max_output_tokens:
  discovery: 24000
  analysis: 16000
  extraction: 12000

# Web search tool. On Anthropic this is the native web_search server tool;
# on Gemini this is Google Search grounding.
web_search:
  enabled: true
  max_uses_per_call: 8

# Retry / backoff
retry:
  max_attempts: 5
  base_delay_seconds: 2.0
  max_delay_seconds: 60.0

# Logging
log_level: INFO

# ---------- Force-include ------------------------------------------------
# Norms the user explicitly wants seeded for each country, BEFORE auto-discovery.
# Each entry:
#   title_hint:  English/canonical title (mandatory)
#   url_hint:    optional — if present, verify+admit directly (no LLM call)
#   type:        statute | regulation | guidance | case_law
#   regulator:   acronym
#   date:        YYYY-MM-DD (optional)
#   short_label: ID-slug hint (LAW14478, IN701...) — keeps IDs predictable
#   title_original: original-language title (optional)
#
# Without url_hint, the pipeline uses targeted semantic resolution to find one.

