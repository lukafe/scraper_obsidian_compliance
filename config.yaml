    # ---------- Layer 2: Banking + Monetary Policy (CBN) ----------
    - title_hint: "CBN Guidelines on Operations of Bank Accounts for Virtual Assets Service Providers (December 2023) — LIFTS the 2021 ban; allows banks to serve SEC-licensed VASPs under strict AML/CFT, due-diligence and monitoring conditions; key milestone in reintegrating crypto with the banking system"
